name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Code Quality and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run Mypy
        run: mypy app src

      - name: Run tests
        run: pytest

  docker-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: quality-and-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: |
          docker build -t gold-direction-api:test .

      - name: Start Docker container
        run: |
          docker run -d \
            --name gold-direction-test \
            -p 8000:8000 \
            gold-direction-api:test

      - name: Test container health
        run: |
          for attempt in {1..10}; do
            if curl --fail http://127.0.0.1:8000/health; then
              echo "Container health check passed."
              exit 0
            fi

            echo "Waiting for the API to start..."
            sleep 3
          done

          echo "Container health check failed."
          docker logs gold-direction-test
          exit 1

      - name: Show container logs
        if: always()
        run: docker logs gold-direction-test || true

      - name: Remove test container
        if: always()
        run: docker rm -f gold-direction-test || true

  publish-docker-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - quality-and-tests
      - docker-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/gold-direction-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/gold-direction-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max